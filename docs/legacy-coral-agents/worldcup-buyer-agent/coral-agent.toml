# Coral-style buyer manifest. Runtime behavior is currently mirrored in Rust;
# this file documents the intended source-of-truth configuration for the agent.
[agent]
name = "worldcup-buyer-agent"
version = "0.1.0"
role = "buyer"
service = "txline"
description = "Broadcasts WANTs from TxLINE triggers, collects bids, awards the best seller, and starts policy-gated settlement."
readme = "The desktop app drives this buyer role. It never signs transactions from the webview; settlement is delegated to the Rust/CoralOS sidecar path."

# Defaults shape buyer behavior: spend cap, bid/verify windows, verifier role,
# and where reputation should eventually be read from.
[defaults]
BUYER_MAX_SOL = "0.001"
BID_WINDOW_MS = "5000"
VERIFY_WINDOW_MS = "20000"
VERIFIER_AGENT = "verifier-agent"
REPUTATION_SOURCE = "sqlite-ledger"
