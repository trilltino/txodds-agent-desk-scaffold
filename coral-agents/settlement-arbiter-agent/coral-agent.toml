# Coral-style settlement manifest. This role bridges verified runs to settlement
# and chain observation; it should never be callable directly from the webview.
[agent]
name = "settlement-arbiter-agent"
version = "0.1.0"
role = "settlement"
service = "settlement.release"
description = "Bridges verified runs to CoralOS settlement and Triton chain observation."
readme = "The desktop Rust core calls this role through runtime/sidecars/coralos-bridge.mjs. Secrets and keypaths stay outside JavaScript."

# Defaults keep settlement devnet-scoped and verifier-gated.
[defaults]
SETTLEMENT_CLUSTER = "devnet"
REQUIRE_VERIFIER_PASS = "true"
OBSERVE_WITH_TRITON = "true"
